<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Buzón</title>
    <link rel="icon" type="image/png" href="sobre-abierto.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>MIS CARTAS</h1>
            <p class="contador" id="contador-cartas">Cargando buzón...</p>
        </header>

        <main id="lista-cartas" class="grid-cartas">
            </main>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal-contenido">
            <div id="wrapper-sobre" class="wrapper-sobre">
                <img src="sobre-cerrado.png" id="img-modal" class="pixel-art">
                <div id="carta-papel" class="carta-papel">
                    <div class="texto-interior">
                        <p id="mensaje-carta"></p>
                    </div>
                    <button class="btn-cerrar" onclick="cerrarCarta()">Volver al buzón</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
